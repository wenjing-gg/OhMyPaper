name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            npm_script: dist:mac
            asset_glob: release/*.dmg
            artifact_name: mac-release
          - os: windows-latest
            npm_script: dist:win
            asset_glob: release/*.exe
            artifact_name: win-release

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Create Python venv (macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Smoke test Python bridge (macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          source .venv/bin/activate
          export HOME="$RUNNER_TEMP/deepxiv-home"
          mkdir -p "$HOME"
          python python/bridge.py token-status '{}'
          python python/bridge.py save-token '{"token":"ci-smoke-token"}'
          python python/bridge.py token-status '{}'

      - name: Create Python venv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Smoke test Python bridge (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\deepxiv-home" | Out-Null
          $env:HOME = "$env:RUNNER_TEMP\deepxiv-home"
          .\.venv\Scripts\python.exe python/bridge.py token-status '{}'
          .\.venv\Scripts\python.exe python/bridge.py save-token '{"token":"ci-smoke-token"}'
          .\.venv\Scripts\python.exe python/bridge.py token-status '{}'

      - name: Build release package
        run: npm run ${{ matrix.npm_script }}

      - name: Upload packaged artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_glob }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-release
          path: release-artifacts/mac

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-release
          path: release-artifacts/win

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/mac/*
            release-artifacts/win/*
          fail_on_unmatched_files: true
